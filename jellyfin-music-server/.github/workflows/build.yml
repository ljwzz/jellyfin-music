name: Build Jellyfin Music Image

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t jellyfin-music:10.11.6 ./jellyfin-music-server

      - name: Save image as tar.gz
        run: docker save jellyfin-music:10.11.6 | gzip > jellyfin-music.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-music-docker-image
          path: jellyfin-music.tar.gz
