name: Build Jellyfin Music Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get latest Jellyfin version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/jellyfin/jellyfin/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_without_v=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Latest Jellyfin version: ${VERSION}"

      - name: Build image
        run: |
          docker build \
            --build-arg JELLYFIN_VERSION="${{ steps.get_version.outputs.version_without_v }}" \
            -t jellyfin-music:${{ steps.get_version.outputs.version_without_v }} \
            -t jellyfin-music:latest \
            .

      - name: Save image as tar.gz
        run: |
          docker save jellyfin-music:${{ steps.get_version.outputs.version_without_v }} | gzip > jellyfin-music-${{ steps.get_version.outputs.version_without_v }}.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Jellyfin Music ${{ steps.get_version.outputs.version }}
          body: |
            Jellyfin Music Server ${{ steps.get_version.outputs.version }}

            Based on Jellyfin ${{ steps.get_version.outputs.version }}
            - Music-focused build with audio transcoding support
            - FFmpeg included for format conversion
            - GPU/video dependencies removed
          files: |
            jellyfin-music-${{ steps.get_version.outputs.version_without_v }}.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
